# Telegraf — Mosquitto (this same container, 127.0.0.1:1883) → InfluxDB 1.8 (127.0.0.1:8086)
#
# Topic convention (see README "Topic conventions" for the full writeup):
#   blueos/<node_id>/sensor/<object_id>/state          numeric sensor (ESPHome default)
#   blueos/<node_id>/switch/<object_id>/state           ON/OFF (ESPHome default)
#   blueos/<node_id>/binary_sensor/<object_id>/state    ON/OFF (ESPHome default)
#   blueos/<node_id>/status                             online/offline (ESPHome LWT)
#   blueos/ext/<extension_slug>/<metric>/state          numeric telemetry from OTHER BlueOS extensions
#   blueos/ext/<extension_slug>/json                    structured JSON telemetry (multiple fields at once)
#
# MQTT_HOST/MQTT_PORT/MQTT_TOPIC_PREFIX are substituted at container start
# (see entrypoint.sh) so the prefix can be changed without rebuilding.

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  hostname = "blueos-site-stack"
  omit_hostname = false

[[outputs.influxdb]]
  urls = ["http://127.0.0.1:8086"]
  database = "esphome"
  skip_database_creation = false
  timeout = "10s"

# ESPHome numeric sensors (explicit — string-valued sensors like SSID / datetime
# must not use data_type=float or Telegraf spam-errors every publish).
[[inputs.mqtt_consumer]]
  name_override = "esphome_sensor"
  servers = ["tcp://${MQTT_HOST}:${MQTT_PORT}"]
  topics = [
    "${MQTT_TOPIC_PREFIX}+/sensor/wifi_signal/state",
    "${MQTT_TOPIC_PREFIX}+/sensor/uptime/state",
    "${MQTT_TOPIC_PREFIX}+/sensor/rtc_temperature/state",
    "${MQTT_TOPIC_PREFIX}+/sensor/rtc_epoch/state",
  ]
  qos = 0
  connection_timeout = "30s"
  client_id = "blueos-telegraf-sensors"
  data_format = "value"
  data_type = "float"
  topic_tag = "topic"

# ESPHome string "sensors" (ESPHome MQTT often publishes text_sensor under /sensor/)
[[inputs.mqtt_consumer]]
  name_override = "esphome_sensor_text"
  servers = ["tcp://${MQTT_HOST}:${MQTT_PORT}"]
  topics = [
    "${MQTT_TOPIC_PREFIX}+/sensor/firmware_version/state",
    "${MQTT_TOPIC_PREFIX}+/sensor/connected_ssid/state",
    "${MQTT_TOPIC_PREFIX}+/sensor/mac_address/state",
    "${MQTT_TOPIC_PREFIX}+/sensor/ip_address/state",
    "${MQTT_TOPIC_PREFIX}+/sensor/rtc_datetime/state",
    "${MQTT_TOPIC_PREFIX}+/sensor/rtc_last_sync/state",
    "${MQTT_TOPIC_PREFIX}+/text_sensor/+/state",
  ]
  qos = 0
  connection_timeout = "30s"
  client_id = "blueos-telegraf-sensor-text"
  data_format = "value"
  data_type = "string"
  topic_tag = "topic"

# ESPHome switches / binary sensors: ON/OFF payloads
[[inputs.mqtt_consumer]]
  name_override = "esphome_switch"
  servers = ["tcp://${MQTT_HOST}:${MQTT_PORT}"]
  topics = [
    "${MQTT_TOPIC_PREFIX}+/switch/+/state",
    "${MQTT_TOPIC_PREFIX}+/binary_sensor/+/state",
  ]
  qos = 0
  connection_timeout = "30s"
  client_id = "blueos-telegraf-switches"
  data_format = "value"
  data_type = "string"
  topic_tag = "topic"

# ESPHome online/offline status (LWT)
[[inputs.mqtt_consumer]]
  name_override = "esphome_status"
  servers = ["tcp://${MQTT_HOST}:${MQTT_PORT}"]
  topics = ["${MQTT_TOPIC_PREFIX}+/status"]
  qos = 0
  connection_timeout = "30s"
  client_id = "blueos-telegraf-status"
  data_format = "value"
  data_type = "string"
  topic_tag = "topic"

# Other BlueOS extensions: single numeric metric per topic, e.g.
# blueos/ext/battery-monitor/voltage/state
[[inputs.mqtt_consumer]]
  name_override = "blueos_ext_metric"
  servers = ["tcp://${MQTT_HOST}:${MQTT_PORT}"]
  topics = ["${MQTT_TOPIC_PREFIX}ext/+/+/state"]
  qos = 0
  connection_timeout = "30s"
  client_id = "blueos-telegraf-ext-metric"
  data_format = "value"
  data_type = "float"
  topic_tag = "topic"

# Other BlueOS extensions: structured JSON payload with multiple fields at
# once, e.g. blueos/ext/battery-monitor/json -> {"voltage":12.6,"current":1.2}
[[inputs.mqtt_consumer]]
  name_override = "blueos_ext_json"
  servers = ["tcp://${MQTT_HOST}:${MQTT_PORT}"]
  topics = ["${MQTT_TOPIC_PREFIX}ext/+/json"]
  qos = 0
  connection_timeout = "30s"
  client_id = "blueos-telegraf-ext-json"
  data_format = "json"
  topic_tag = "topic"

[[inputs.internal]]
  collect_memstats = false
