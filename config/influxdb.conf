# Minimal InfluxDB 1.8 config — HTTP API/UI on all interfaces for BlueOS LAN use.
[meta]
  dir = "/var/lib/influxdb/meta"

[data]
  dir = "/var/lib/influxdb/data"
  wal-dir = "/var/lib/influxdb/wal"
  series-id-set-cache-size = 100

[http]
  enabled = true
  bind-address = ":8086"
  auth-enabled = false
  flux-enabled = false

[logging]
  level = "info"
  suppress-logo = true

[monitor]
  store-enabled = false

[subscriber]
  enabled = false
