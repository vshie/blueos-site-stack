# BlueOS site-stack — LAN Mosquitto broker (bundled with InfluxDB + Telegraf)
#
# Persistence: /mosquitto/data (bind-mounted from BlueOS)
# TCP MQTT:    1883
# WebSockets:  9001  (browser tools / optional Grafana live)
# Status UI:   80    (BlueOS Extensions "Open", served by this same container)

persistence true
persistence_location /mosquitto/data/
autosave_interval 60

# Log to stdout for `docker logs` / BlueOS extension logs
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true

# v0.1: open LAN broker (tighten with password_file in a later release)
listener 1883
protocol mqtt
allow_anonymous true

listener 9001
protocol websockets
allow_anonymous true

# Keep sockets usable behind BlueOS / Docker port publishing
max_keepalive 120
